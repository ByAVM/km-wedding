name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  PUBLISH_DIR: dist

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (if needed)
        if: ${{ exists('package.json') }}
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & build (Node)
        if: ${{ exists('package.json') }}
        run: |
          npm ci
          npm run build --if-present

      - name: Fallback message (no build step)
        if: ${{ !exists('package.json') }}
        run: |
          echo "No package.json found — ensure $PUBLISH_DIR contains files to publish."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1